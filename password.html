<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shintaro Yanagi — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'Jost', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .pill {
      display: flex;
      align-items: center;
      width: 480px;
      border: 1px solid #c8c8c8;
      border-radius: 999px;
      background: #fff;
      padding: 10px 10px 10px 28px;
    }

    input[type="password"] {
      flex: 1;
      border: none;
      background: none;
      font-family: 'Jost', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: #1a1a1a;
      outline: none;
    }

    input[type="password"]::placeholder {
      color: #bbb;
    }

    button {
      background: #c8c8c8;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 24px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    button:hover { background: #aaa; }
    button.active { background: #1a1a1a; }
    button.active:hover { background: #444; }

    .error {
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: #999;
      min-height: 16px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="pill">
    <input type="password" id="pw" placeholder="パスワードを入力..." autocomplete="off">
    <button id="btn">送信</button>
  </div>
  <p class="error" id="error"></p>

  <script>
    const CORRECT = 'Shintaro_202603';

    function attempt() {
      const val = document.getElementById('pw').value;
      if (val === CORRECT) {
        localStorage.setItem('portfolio_auth', '1');
        window.location.href = 'index.html';
      } else {
        document.getElementById('error').textContent = 'Incorrect password';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }

    document.getElementById('pw').addEventListener('input', function() {
      document.getElementById('btn').classList.toggle('active', this.value.length > 0);
    });
    document.getElementById('btn').addEventListener('click', attempt);
    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') attempt();
    });
  </script>
</body>
</html>
